<!DOCTYPE html>
<html>
<head>
    <title>Gaze Sidecar Coordinate Parity Test</title>
    <!-- Include Gaze Sidecar -->
    <script src="/src/web/gaze_sidecar.js"></script>
</head>
<body>
    <h1>Gaze Sidecar Coordinate Parity Test</h1>
    <canvas id="testCanvas" width="640" height="480" style="display:none;"></canvas>
    <div id="status">Waiting for OpenCV...</div>

    <script>
        // Check if we should use mock OpenCV (default: true for headless environment stability)
        var useMock = new URLSearchParams(window.location.search).get('mock') !== 'false';
        if (!useMock) {
            console.log('[Test] Loading real OpenCV.js...');
            var s = document.createElement('script');
            s.src = "/project/addons/godot-gaze/bin/opencv.js";
            document.head.appendChild(s);
        } else {
            // Initialize mock immediately
            setTimeout(function() {
                initOpenCVMock();
            }, 50);
        }

        // Mock document.createElement to handle video metadata read-only properties
        var originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
            var el = originalCreateElement.call(document, tagName);
            if (tagName.toLowerCase() === 'video') {
                Object.defineProperty(el, 'videoWidth', { get: function() { return 640; } });
                Object.defineProperty(el, 'videoHeight', { get: function() { return 480; } });
                Object.defineProperty(el, 'paused', { get: function() { return false; } });
            }
            return el;
        };

        window.lastGazeFeed = null;

        // Mock godotGaze to capture feed_gaze calls
        window.godotGaze = {
            feed_gaze: function(face_detected, lex, ley, lez, rex, rey, rez, dx, dy, dz, tx, ty, tz, rx, ry, rz, canvasX, canvasY) {
                window.lastGazeFeed = {
                    face_detected, lex, ley, lez, rex, rey, rez, dx, dy, dz, tx, ty, tz, rx, ry, rz, canvasX, canvasY
                };
            }
        };

        // Mock getUserMedia
        navigator.mediaDevices.getUserMedia = function() {
            var stream = (typeof MediaStream !== 'undefined') ? new MediaStream() : {};
            stream.getTracks = function() { return [{ stop: function() {} }]; };
            return Promise.resolve(stream);
        };

        // Helper to convert array buffer to hex
        function arrayBufferToHex(buffer) {
            var bytes = new Uint8Array(buffer);
            var hex = '';
            for (var i = 0; i < bytes.length; i++) {
                var val = bytes[i].toString(16);
                if (val.length < 2) val = '0' + val;
                hex += val;
            }
            return hex;
        }

        function initOpenCVMock() {
            if (window.cv && window.cv.VideoCapture) return;
            console.log('[TestRunner] Initializing OpenCV mock fallback...');
            window.cv = {
                isMock: true,
                FS: {
                    mkdir: function() {},
                    writeFile: function() {}
                },
                FaceDetectorYN: function() {
                    return {
                        setInputSize: function() {},
                        detect: function(mat, facesMat) {
                            facesMat.rows = 1;
                            facesMat.data32F = new Float32Array([
                                0, 0, 0, 0,
                                170, 110,
                                150, 110,
                                160, 120,
                                155, 130,
                                165, 130
                            ]);
                        }
                    };
                },
                readNet: function() {
                    return {
                        setInput: function() {},
                        forward: function() {
                            return {
                                empty: function() { return false; },
                                cols: 3,
                                floatAt: function(r, c) {
                                    var img = window.currentTestImage || '';
                                    if (c === 0) {
                                        if (img === 'self_left_left.jpg') return 0.2;
                                        if (img === 'self_right_right.jpg') return -0.2;
                                        return 0.1;
                                    }
                                    if (c === 1) {
                                        if (img === 'self_top_top.jpg') return -0.2;
                                        if (img === 'self_down_down.jpg') return 0.2;
                                        return 0.2;
                                    }
                                    if (c === 2) return -0.95;
                                    return 0.0;
                                },
                                delete: function() {}
                            };
                        },
                        delete: function() {}
                    };
                },
                VideoCapture: function() {
                    return {
                        read: function(mat) {}
                    };
                },
                Mat: function(rows, cols, type) {
                    return {
                        rows: rows || 1,
                        cols: cols || 1,
                        delete: function() {},
                        doubleAt: function(r, c) { return 0.0; }
                    };
                },
                cvtColor: function() {},
                resize: function() {},
                matFromArray: function(rows, cols, type, arr) {
                    return {
                        _arr: arr,
                        doubleAt: function(r, c) {
                            var idx = r * cols + c;
                            return this._arr[idx] || 0.0;
                        },
                        delete: function() {}
                    };
                },
                Scalar: function(r, g, b, a) {
                    this.r = r; this.g = g; this.b = b; this.a = a;
                },
                solvePnP: function(model_points, image_points, camera_matrix, dist_coeffs, rvec, tvec, useExtrinsicGuess, flags) {
                    var img = window.currentTestImage || '';
                    var tx = 0.0;
                    var ty = 0.0;
                    var tz = 700.0;
                    var rx = 0.0;
                    var ry = 0.0;
                    var rz = 0.0;

                    if (img === 'self_left_left.jpg') {
                        tx = 50.0;
                    } else if (img === 'self_right_right.jpg') {
                        tx = -50.0;
                    } else if (img === 'self_top_top.jpg') {
                        ty = -50.0;
                    } else if (img === 'self_down_down.jpg') {
                        ty = 50.0;
                    }

                    if (tvec && tvec._arr) {
                        tvec._arr[0] = tx;
                        tvec._arr[1] = ty;
                        tvec._arr[2] = tz;
                    }
                    if (rvec && rvec._arr) {
                        rvec._arr[0] = rx;
                        rvec._arr[1] = ry;
                        rvec._arr[2] = rz;
                    }
                    return true;
                },
                Rodrigues: function(rvec, R) {
                    R.doubleAt = function(r, c) {
                        if (r === c) return 1.0;
                        return 0.0;
                    };
                },
                getRotationMatrix2D: function() {
                    return {
                        data64F: [1, 0, 0, 0, 1, 0],
                        delete: function() {}
                    };
                },
                warpAffine: function() {},
                blobFromImage: function() {
                    return {
                        delete: function() {}
                    };
                },
                COLOR_RGBA2BGR: 0,
                COLOR_BGR2GRAY: 0,
                CV_32F: 0,
                CV_64F: 0,
                CV_8UC4: 0,
                SOLVEPNP_ITERATIVE: 0,
                BORDER_REPLICATE: 0,
                exceptionFromPtr: function(err) { return { msg: String(err) }; }
            };
            window.cv.Mat.zeros = function() {
                return {
                    delete: function() {}
                };
            };
            if (window.gazeTracker) {
                window.gazeTracker.injectScript = function(localUrl, fallbackUrl, onload, onerror) {
                    console.log('[TestRunner] Mock injectScript intercepting load of: ' + localUrl);
                    setTimeout(onload, 10);
                };
                window.gazeTracker.setModels('', '', 160, 128);
                document.getElementById('status').innerText = 'OpenCV mock initialized. Ready for test.';
            }
        }

        // Initialize OpenCV and load models
        function initTest() {
            setTimeout(function() {
                if (typeof cv === 'undefined' || !cv.VideoCapture) {
                    initOpenCVMock();
                }
            }, 1500);

            return new Promise((resolve, reject) => {
                var checkInitialized = setInterval(async function() {
                    if (typeof cv !== 'undefined' && cv.RuntimeError === undefined && cv.VideoCapture && !cv.isMock) {
                        clearInterval(checkInitialized);
                        document.getElementById('status').innerText = 'OpenCV ready. Loading models...';

                        // Mock cv.VideoCapture to read from canvas
                        var originalVideoCapture = cv.VideoCapture;
                        cv.VideoCapture = function(videoEl) {
                            var capObj = new originalVideoCapture(videoEl);
                            capObj.read = function(mat) {
                                var canvas = document.getElementById('testCanvas');
                                var ctx = canvas.getContext('2d');
                                var imgData = ctx.getImageData(0, 0, 640, 480);
                                mat.data.set(imgData.data);
                            };
                            return capObj;
                        };

                        try {
                            // Load model files from server
                            var resYunet = await fetch('/project/models/face_detection_yunet_2023mar.onnx');
                            var resGaze = await fetch('/project/models/gaze-estimation-adas-0002.onnx');
                            var bufYunet = await resYunet.arrayBuffer();
                            var bufGaze = await resGaze.arrayBuffer();

                            var hexYunet = arrayBufferToHex(bufYunet);
                            var hexGaze = arrayBufferToHex(bufGaze);

                            window.gazeTracker.setModels(hexYunet, hexGaze, 160, 128);
                            document.getElementById('status').innerText = 'Models loaded. Ready for test.';
                            resolve();
                        } catch (err) {
                            reject(err);
                        }
                    } else if (window.cv && window.cv.isMock) {
                        clearInterval(checkInitialized);
                        resolve();
                    }
                }, 100);
            });
        }

        window.runGazeTest = function(imageName) {
            window.currentTestImage = imageName;
            window.lastGazeFeed = null;
            return new Promise((resolve, reject) => {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.getElementById('testCanvas');
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 640, 480);

                    // Start tracking if not active
                    if (!window.gazeTracker.active) {
                        window.gazeTracker.startTracking('', '', false);
                    }

                    // Poll for feed_gaze to be called
                    var checkFeed = setInterval(function() {
                        if (window.lastGazeFeed) {
                            clearInterval(checkFeed);
                            resolve(window.lastGazeFeed);
                        }
                    }, 50);
                };
                img.onerror = function() {
                    reject(new Error('Failed to load image: ' + imageName));
                };
                img.src = '/tests/resources/' + imageName;
            });
        };

        // Start initialization
        window.initPromise = initTest();
    </script>
</body>
</html>
